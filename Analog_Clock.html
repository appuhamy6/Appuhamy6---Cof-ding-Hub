<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Analog Clock</title>
    </head>
    <body>
        <style>
            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
                font-family: sans-serif;
                color: #fff;
            }
            body{
                background-color: rgb(33, 33, 34);
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .clock{
                position: relative;
                border-radius: 50%;
                width: 500px;
                height: 500px;
                display: flex;
                align-items: center;
                justify-content: center;
                border: 20px solid #181229;
                outline: 10px solid rgb(108, 108, 108);
                outline-offset: -20px;
            }
            .container{
                background-color: rgba(255, 255, 255, 0.05);
                border-radius: 50%;
                padding: 10px;
                outline: 10px solid #3b3831;
                outline-offset: 5px;
                box-shadow: 0 0 80px #000;
            }
            .clock span{
                position: absolute;
                transform: rotate(calc(30deg * var(--j)));
                inset: 20px;
                text-align: center;
            }
            
            .clock span b{
                transform: rotate(calc(-30deg * var(--j))); 
                display: inline-block;
                font-size: 24px;
                font-weight: 700;
                text-align: center;
            }
            .clock::before{
                content: "";
                position: absolute;
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background-color: white;
                z-index: 2; 
            }
            .hand{
                position: absolute;
                display: flex;
                justify-content: center;
                align-items: flex-end;
                bottom: 50%; 
                transform-origin: bottom; 
                z-index: 1;
            }
            .hand i{
                position: absolute;
                background-color: var(--clr);
                height: var(--ht);
                width: var(--wt);
                border-radius: 5px;
            }
        </style>
        <div class="container">
            <div class="clock">
                <div class="hand" id="hour" style="--clr:#ff3d58; --ht:120px; --wt:9px"><i></i></div>
                <div class="hand" id="minute" style="--clr:#00a6ff; --ht:150px; --wt:7px"><i></i></div>
                <div class="hand" id="second" style="--clr:white; --ht:170px; --wt:4px"><i></i></div>
                <span style="--j:1"><b>1</b></span>
                <span style="--j:2"><b>2</b></span>
                <span style="--j:3"><b>3</b></span>
                <span style="--j:4"><b>4</b></span>
                <span style="--j:5"><b>5</b></span>
                <span style="--j:6"><b>6</b></span>
                <span style="--j:7"><b>7</b></span>
                <span style="--j:8"><b>8</b></span>
                <span style="--j:9"><b>9</b></span>
                <span style="--j:10"><b>10</b></span>
                <span style="--j:11"><b>11</b></span>
                <span style="--j:12"><b>12</b></span>
            </div>
        </div>
        <script>
            let hour = document.getElementById('hour');
            let minute = document.getElementById('minute');
            let second = document.getElementById("second");

            function displayTime(){
                let date = new Date();
                let hh = date.getHours();
                let mm = date.getMinutes();
                let ss = date.getSeconds();

                let hRotation = 30 * hh + mm / 2 + ss / 120;
                let mRotation = 6 * mm + ss / 10;
                let sRotation = 6 * ss;
                
                hour.style.transform = `rotate(${hRotation}deg)`;
                minute.style.transform = `rotate(${mRotation}deg)`;
                second.style.transform = `rotate(${sRotation}deg)`;
            }
            displayTime(); 
            setInterval(displayTime, 1000);
        </script>
    </body>
</html>
